global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: chrono-job-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["172.17.0.1:8081"]

  - job_name: chrono-auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["172.17.0.1:8084"]

  - job_name: chrono-scheduler-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["172.17.0.1:8082"]

  - job_name: chrono-executor-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["172.17.0.1:8083"]

  - job_name: chrono-api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["172.17.0.1:8080"]
