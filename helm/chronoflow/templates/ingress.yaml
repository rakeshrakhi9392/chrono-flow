{{- if and .Values.services.gateway.enabled .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.services.gateway.name }}
  labels:
    {{- include "chronoflow.labels" . | nindent 4 }}
spec:
  {{- if .Values.gateway.ingress.className }}
  ingressClassName: {{ .Values.gateway.ingress.className | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.gateway.name }}
                port:
                  number: {{ .Values.services.gateway.port }}
{{- end }}
