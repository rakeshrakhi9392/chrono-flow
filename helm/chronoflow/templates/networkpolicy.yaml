{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chronoflow.fullname" . }}-default-deny-ingress
  labels:
    {{- include "chronoflow.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chronoflow.fullname" . }}-allow-internal
  labels:
    {{- include "chronoflow.labels" . | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chronoflow.fullname" . }}-allow-gateway-public
  labels:
    {{- include "chronoflow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.services.gateway.name }}
  ingress:
    - {}
  policyTypes:
    - Ingress
{{- end }}
