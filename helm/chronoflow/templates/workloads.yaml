{{- $root := . -}}
{{- range $svcKey, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "chronoflow.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "chronoflow.labels" $root | nindent 8 }}
        app.kubernetes.io/name: {{ $svc.name }}
    spec:
      securityContext:
        {{- toYaml $root.Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $svc.name }}
          image: {{ $svc.image }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml $root.Values.global.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ $svc.port }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          env:
            - name: SERVER_PORT
              value: {{ $svc.port | quote }}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: MANAGEMENT_OTLP_TRACING_ENDPOINT
            {{- if eq $svcKey "gateway" }}
            - name: APP_SECURITY_AUTH_SERVICE_BASE_URL
              value: "http://{{ $root.Values.services.auth.name }}:{{ $root.Values.services.auth.port }}"
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATA_REDIS_PORT
            {{- end }}
            {{- if or (eq $svcKey "job") (eq $svcKey "scheduler") }}
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATA_REDIS_PORT
            {{- end }}
            {{- if or (eq $svcKey "job") (eq $svcKey "auth") (eq $svcKey "executor") }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chronoflow.fullname" $root }}-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "chronoflow.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ $svc.name }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - protocol: TCP
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "chronoflow.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svc.name }}
  minReplicas: {{ $svc.minReplicas }}
  maxReplicas: {{ $svc.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.cpuTargetUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svc.memoryTargetUtilization }}
{{- end }}
{{- end }}
