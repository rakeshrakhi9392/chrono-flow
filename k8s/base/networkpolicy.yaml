apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronoflow-default-deny-ingress
  namespace: chronoflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronoflow-allow-internal
  namespace: chronoflow
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronoflow-allow-gateway-public
  namespace: chronoflow
spec:
  podSelector:
    matchLabels:
      app: chrono-api-gateway
  ingress:
    - {}
  policyTypes:
    - Ingress
